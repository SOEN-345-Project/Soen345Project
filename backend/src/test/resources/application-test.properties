# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT settings for tests
security.jwt.secret-key=testSecretKeyForJwtTokenGenerationInTestEnvironment123456
security.jwt.expiration-time=3600000

# Twilio settings (mock for tests)
twilio.account-sid=test-account-sid
twilio.auth-token=test-auth-token
twilio.phone-number=+15555555555

# Mail settings (mock for tests)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test

# Don't try to import .env file in tests
spring.config.import=optional:file:.env[.properties]

# Disable Swagger in tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false