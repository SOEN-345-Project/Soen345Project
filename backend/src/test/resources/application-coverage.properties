# Same as test profile: H2 + JWT + mail + Twilio placeholders. Profile name is "coverage"
# so SecurityConfiguration (@Profile("!test")) loads for JaCoCo.
spring.datasource.url=jdbc:h2:mem:coveragedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

security.jwt.secret-key=testSecretKeyForJwtTokenGenerationInTestEnvironment123456
security.jwt.expiration-time=3600000

twilio.account-sid=test-account-sid
twilio.auth-token=test-auth-token
twilio.phone-number=+15555555555

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test

spring.config.import=optional:file:.env[.properties]
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

e2e.expose-verification-code=false
e2e.verification-secret=
