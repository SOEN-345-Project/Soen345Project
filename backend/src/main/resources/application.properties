spring.application.name=project



spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.jwt.secret-key =${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SUPPORT_EMAIL}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

spring.config.import=optional:file:.env[.properties]

# Cloud hosts set PORT; use 8000 locally.
server.port=${PORT:8000}

# Comma-separated. Override with env CORS_ALLOWED_ORIGINS on Render etc. (include your Vercel URL).
cors.allowed-origins=http://localhost:3000,http://localhost:8080
server.max-http-request-header-size=32768

# E2E only: GET /auth/e2e/verification-code?email=... with header X-E2E-Secret
e2e.expose-verification-code=false
e2e.verification-secret=