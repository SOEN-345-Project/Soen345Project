name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ changes ]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean install --file backend/pom.xml

      - name: Run tests
        run: mvn test --file backend/pom.xml

      - name: Generate JaCoCo coverage report
        run: mvn jacoco:report --file backend/pom.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-backend
          fail_ci_if_error: true

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: backend/target/site/jacoco/
          if-no-files-found: ignore

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true') }}


    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run frontend tests with coverage
        run: npm test -- --coverage --watchAll=false
        working-directory: ./frontend

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: codecov-frontend
          fail_ci_if_error: true

      - name: Archive frontend coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-coverage-report
          path: frontend/coverage/
          if-no-files-found: ignore